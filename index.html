<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>To-Do List</h2>
    <input type="text" id="task" placeholder="Tambahkan tugas...">
    <button onclick="addTask()">Tambah</button>
    <ul id="taskList"></ul>
    
    <h2>Kalkulator</h2>
    <input type="number" id="num1" placeholder="Angka 1">
    <input type="number" id="num2" placeholder="Angka 2">
    <button onclick="calculate('+')">+</button>
    <button onclick="calculate('-')">-</button>
    <button onclick="calculate('*')">*</button>
    <button onclick="calculate('/')">/</button>
    <button onclick="calculate('%')">%</button>
    <button onclick="calculate('**')">Pangkat</button>
    <button onclick="calculate('sqrt')">√</button>
    <p>Hasil: <span id="result"></span></p>
    
    <h2>Validasi Form</h2>
    <input type="text" id="name" placeholder="Nama">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="validateForm()">Submit</button>
    <p id="errorMsg" style="color: red;"></p>
    
    <script src="app.js"></script>
</body>
</html>
