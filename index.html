<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker Mahasiswa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow-md space-y-6">
    <header>
      <h1 class="text-2xl font-bold text-blue-600">Expense Tracker Mahasiswa</h1>
      <p class="text-gray-600 text-sm">Catat semua pengeluaranmu dengan mudah</p>
    </header>

    <form id="expense-form" class="space-y-4">
      <input type="text" id="description" placeholder="Deskripsi pengeluaran" required class="w-full border p-2 rounded-md" />
      <input type="number" id="amount" placeholder="Jumlah (Rp)" required class="w-full border p-2 rounded-md" />
      <select id="category" class="w-full border p-2 rounded-md">
        <option value="makanan">Makanan</option>
        <option value="transport">Transport</option>
        <option value="tugas">Tugas</option>
        <option value="lainnya">Lainnya</option>
      </select>
      <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600">Tambah</button>
    </form>

    <div class="flex justify-between items-center">
      <label for="filter" class="text-sm text-gray-600">Filter kategori:</label>
      <select id="filter" class="border rounded-md p-1 text-sm">
        <option value="all">Semua</option>
        <option value="makanan">Makanan</option>
        <option value="transport">Transport</option>
        <option value="tugas">Tugas</option>
        <option value="lainnya">Lainnya</option>
      </select>
    </div>

    <section id="expenses-list" class="space-y-2"></section>

    <section class="pt-6">
      <h3 class="font-semibold text-gray-700 mb-2">Distribusi Pengeluaran</h3>
      <div class="max-h-[250px] overflow-hidden">
        <canvas id="expenseChart"></canvas>
      </div>
    </section>

    <footer class="border-t pt-4">
      <p class="text-lg font-semibold">Total Pengeluaran: <span id="total" class="text-blue-600">Rp0</span></p>
    </footer>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
